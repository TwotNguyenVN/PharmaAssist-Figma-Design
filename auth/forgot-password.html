<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - PharmaAssist</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#024ad8',
                            soft: '#c9e0fc',
                            deep: '#0e3191',
                            bright: '#296ef9'
                        },
                        neutral: {
                            cloud: '#f7f7f7',
                            fog: '#e8e8e8',
                            steel: '#c2c2c2',
                            graphite: '#636363',
                            charcoal: '#3d3d3d'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
        }
    </style>
</head>
<body class="bg-[#f7f7f7] min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white rounded-[16px] shadow-sm border border-[#e8e8e8] overflow-hidden flex flex-col">
        <!-- HEADER -->
        <div class="p-8 pb-6 flex flex-col items-center border-b border-[#e8e8e8]">
            <div class="bg-[#024ad8] text-white p-3 rounded-[12px] shadow-md shadow-[#024ad8]/20 mb-4">
                <i data-lucide="sparkles" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-[#1a1a1a]">Pharma<span class="text-[#024ad8]">Assist</span></h1>
            <p class="text-[10px] text-[#636363] font-bold uppercase tracking-wider mt-1">Hệ thống thông minh</p>
        </div>

        <!-- FORM CONTENT -->
        <div class="p-8 pt-6">
            <div class="text-center mb-6">
                <h2 class="text-xl font-extrabold text-[#1a1a1a]">Quên mật khẩu</h2>
                <p class="text-sm text-[#636363] mt-2">Nhập email tài khoản để nhận hướng dẫn đặt lại mật khẩu.</p>
            </div>

            <!-- Error State (Hidden by default) -->
            <div id="error-message" class="hidden mb-4 p-3 bg-red-50 text-[#b3262b] text-sm font-medium rounded-[8px] border border-red-100 flex gap-2 items-start">
                <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i>
                <p>Không tìm thấy tài khoản với email này.</p>
            </div>

            <!-- Success State (Hidden by default) -->
            <div id="success-message" class="hidden mb-4 p-3 bg-emerald-50 text-emerald-700 text-sm font-medium rounded-[8px] border border-emerald-100 flex gap-2 items-start">
                <i data-lucide="check-circle-2" class="w-5 h-5 shrink-0 mt-0.5"></i>
                <p>Yêu cầu đặt lại mật khẩu đã được gửi. Vui lòng kiểm tra email của bạn.</p>
            </div>

            <form id="reset-form" class="space-y-4" onsubmit="handleReset(event)">
                <div class="space-y-1">
                    <label class="block text-xs font-bold text-[#3d3d3d] uppercase tracking-wider">Email</label>
                    <input type="email" id="email" required placeholder="admin@pharmaassist.com" class="w-full px-4 py-2.5 border border-[#c2c2c2] rounded-[4px] focus:outline-none focus:border-[#024ad8] focus:ring-1 focus:ring-[#024ad8]/20 transition-all font-medium text-[#1a1a1a] text-sm">
                </div>

                <button type="submit" class="w-full h-[44px] bg-[#024ad8] text-white rounded-[4px] font-bold text-sm uppercase tracking-wide hover:bg-[#0e3191] transition-all shadow-sm flex justify-center items-center gap-2">
                    GỬI YÊU CẦU
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="../auth/login.html" class="text-sm font-bold text-[#024ad8] hover:text-[#0e3191] transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Quay lại đăng nhập
                </a>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function handleReset(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const errorMsg = document.getElementById('error-message');
            const successMsg = document.getElementById('success-message');
            const form = document.getElementById('reset-form');

            // Reset states
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            // Demo logic
            if (email === 'admin@pharmaassist.com') {
                successMsg.classList.remove('hidden');
                form.reset();
            } else {
                errorMsg.classList.remove('hidden');
            }
        }
    </script>
<script src="../global_ui.js"></script>
</body>
</html>
